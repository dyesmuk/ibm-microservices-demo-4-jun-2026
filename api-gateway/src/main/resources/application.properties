server.port=8080

spring.application.name=api-gateway

# ── Service Discovery ─────────────────────────────────────────────────
# Auto-create routes for every service registered in Eureka
# e.g. /employee-service/** is automatically routed to lb://employee-service
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ── Manual Routes ─────────────────────────────────────────────────────
# Routes are indexed starting from 0.
# Each route needs: id, uri, predicates, and filters.

# Route 1 — Employee Service
spring.cloud.gateway.routes[0].id=employee-service
spring.cloud.gateway.routes[0].uri=lb://employee-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/employees/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Route 2 — Department Service (departments)
spring.cloud.gateway.routes[1].id=department-service-dept
spring.cloud.gateway.routes[1].uri=lb://department-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/departments/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Route 3 — Department Service (jobs - same service, different path)
spring.cloud.gateway.routes[2].id=department-service-job
spring.cloud.gateway.routes[2].uri=lb://department-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/jobs/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Route 4 — Project Service
spring.cloud.gateway.routes[3].id=project-service
spring.cloud.gateway.routes[3].uri=lb://project-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/projects/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# ── Eureka Client ─────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Actuator ──────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
