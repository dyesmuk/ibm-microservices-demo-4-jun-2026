server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Automatically create routes from Eureka-registered services
      # e.g. /employee-service/** -> lb://employee-service/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true   # Use lowercase service names in URLs

      # Manual fine-grained routes (optional, but shows the concept clearly)
      routes:

        # ── Employee Service ────────────────────────────────────────────────
        - id: employee-service
          uri: lb://employee-service           # lb = client-side load balancing via Eureka
          predicates:
            - Path=/api/employees/**
          filters:
            - StripPrefix=1                    # Strip /api before forwarding

        # ── Department Service ──────────────────────────────────────────────
        - id: department-service-dept
          uri: lb://department-service
          predicates:
            - Path=/api/departments/**
          filters:
            - StripPrefix=1

        - id: department-service-job
          uri: lb://department-service
          predicates:
            - Path=/api/jobs/**
          filters:
            - StripPrefix=1

        # ── Project Service ─────────────────────────────────────────────────
        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/api/projects/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
